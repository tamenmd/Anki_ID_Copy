name: Build Anki Add-on

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Code herunterladen
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. NEU: meta.json Timestamp aktualisieren
    # Das sorgt dafür, dass Anki die Datei immer als "neue Version" erkennt.
    - name: Update mod time in meta.json
      run: |
        python3 -c 'import json, time; f="meta.json"; d=json.load(open(f)); d["mod"]=int(time.time()); json.dump(d, open(f,"w"))'
        echo "Updated meta.json mod time to current timestamp."

    # 3. .ankiaddon Datei erstellen (zippen)
    - name: Create .ankiaddon file
      run: |
        # Zippt alles im aktuellen Ordner, schließt aber Git-Dateien und Tests aus
        zip -r Anki_ID_Copy.ankiaddon . -x ".git/*" ".github/*" ".gitignore" ".gitattributes" "README.md" "*.ui" "screenshots/*"

    # 4. Upload als Artifact (damit du es direkt herunterladen kannst)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Anki_ID_Copy-latest
        path: Anki_ID_Copy.ankiaddon

    # 5. Automatisch an das Release anhängen (nur wenn du ein Release erstellst)
    - name: Upload to Release
      if: github.event_name == 'release'
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: Anki_ID_Copy.ankiaddon
        asset_name: Anki_ID_Copy.ankiaddon
        tag: ${{ github.ref }}
        overwrite: true