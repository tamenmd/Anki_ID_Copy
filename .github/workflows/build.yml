name: Build Anki Add-on

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Code herunterladen
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Python bereitstellen
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # 3. Syntax prüfen und Unit-Tests laufen lassen
    #    (py_compile importiert aqt nicht, daher kein Anki nötig)
    - name: Compile & test
      run: |
        python -m py_compile __init__.py nid_tools.py
        python -m unittest discover -s tests -v

    # 4. .ankiaddon Datei erstellen (nur die Dateien, die ins Add-on gehören)
    #    Bewusst OHNE meta.json: die verwaltet Anki lokal pro Installation.
    - name: Create .ankiaddon file
      run: zip Anki_ID_Copy.ankiaddon __init__.py nid_tools.py manifest.json config.json config.md

    # 5. Archiv-Inhalt verifizieren (verhindert kaputte Releases)
    - name: Verify archive contents
      run: |
        for f in __init__.py nid_tools.py manifest.json config.json config.md; do
          unzip -l Anki_ID_Copy.ankiaddon | grep -q "$f" || { echo "FEHLT im Archiv: $f"; exit 1; }
        done
        echo "Archiv enthält alle Pflichtdateien."

    # 6. Upload als Artifact (damit du es direkt herunterladen kannst)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Anki_ID_Copy-latest
        path: Anki_ID_Copy.ankiaddon

    # 7. Automatisch an das Release anhängen (nur wenn du ein Release erstellst)
    - name: Upload to Release
      if: github.event_name == 'release'
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: Anki_ID_Copy.ankiaddon
        asset_name: Anki_ID_Copy.ankiaddon
        tag: ${{ github.ref }}
        overwrite: true
